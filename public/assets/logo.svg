<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass icon -->
  <g transform="translate(4, 6)">
    <circle cx="16" cy="16" r="12" fill="none" stroke="url(#logo-gradient)" stroke-width="3"/>
    <line x1="25" y1="25" x2="34" y2="34" stroke="url(#logo-gradient)" stroke-width="3" stroke-linecap="round"/>
    <!-- Checkmark inside -->
    <polyline points="10,16 14,20 22,12" fill="none" stroke="url(#logo-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="48" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">
    <tspan fill="#1f2937">factual</tspan><tspan fill="url(#logo-gradient)">Search</tspan>
    <tspan fill="#6b7280" font-size="14" font-weight="400" dx="4">.news</tspan>
  </text>
</svg>
